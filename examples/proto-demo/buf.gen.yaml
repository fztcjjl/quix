version: v2
managed:
  enabled: true
  disable:
    - file_option: go_package_prefix
      module: buf.build/bufbuild/protovalidate
plugins:
  - protoc_builtin: go
    out: gen
    opt:
      - paths=source_relative
  - local: protoc-gen-quix-gin
    out: gen
    opt:
      - paths=source_relative
  - local: protoc-gen-quix-errors
    out: gen
    opt:
      - paths=source_relative
