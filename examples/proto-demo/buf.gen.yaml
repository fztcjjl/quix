version: v2
managed:
  enabled: true
plugins:
  - protoc_builtin: go
    out: gen
    opt:
      - paths=source_relative
  - local: protoc-gen-quix-gin
    out: gen
    opt:
      - paths=source_relative
  - local: protoc-gen-quix-errors
    out: gen
    opt:
      - paths=source_relative
  - remote: buf.build/bufbuild/validate-go
    out: gen
    opt:
      - paths=source_relative
