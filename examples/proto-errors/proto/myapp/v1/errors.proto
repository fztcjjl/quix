syntax = "proto3";

package myapp.v1;

option go_package = "github.com/fztcjjl/quix/examples/proto-errors/gen/myapp/v1;myappv1";

import "errdesc/errdesc.proto";

// UserError defines user-related error codes.
enum UserError {
  USER_ERROR_UNSPECIFIED     = 0 [(errdesc.http_status) = 400, (errdesc.error_message) = "未知错误"];
  USER_ERROR_NOT_FOUND       = 1 [(errdesc.http_status) = 404, (errdesc.error_message) = "用户不存在"];
  USER_ERROR_ALREADY_EXISTS  = 2 [(errdesc.http_status) = 409, (errdesc.error_message) = "用户已存在"];
  USER_ERROR_PERMISSION_DENIED = 3 [(errdesc.http_status) = 403, (errdesc.error_message) = "没有权限"];
}
