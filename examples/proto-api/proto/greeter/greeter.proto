syntax = "proto3";

package greeter;

option go_package = "github.com/fztcjjl/quix/examples/proto-api/gen/greeter;greeter";

import "google/api/annotations.proto";

service Greeter {
  rpc SayHello (HelloRequest) returns (HelloResponse) {
    option (google.api.http) = {
      get: "/hello/{name}"
    };
  }
}

message HelloRequest {
  string name = 1;
}

message HelloResponse {
  string message = 1;
}

